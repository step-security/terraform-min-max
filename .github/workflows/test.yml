name: integration

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/**'
      - 'dist/**'
      - 'src/**'
      - 'action.yml'
      - 'package.json'
      - 'package-lock.json'
  push:
    branches:
      - main
    paths:
      - '.github/workflows/**'
      - 'dist/**'
      - 'src/**'
      - 'action.yml'
      - 'package.json'
      - 'package-lock.json'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-build:
    name: Verify dist is up to date
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24

      - name: Install, test, and build
        run: |
          npm ci --ignore-scripts
          npm run all

      - name: Check for uncommitted changes
        run: |
          if ! git diff --quiet dist/; then
            echo "::error::dist/index.js is out of date. Run 'npm run compile' and commit the result."
            git diff --stat dist/
            exit 1
          fi

  integration:
    name: Integration test
    needs: verify-build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        directory:
          - tests/0.12
          - tests/0.13
          - tests/terraform-aws-alb
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Terraform min/max versions
        id: minMax
        uses: ./
        with:
          directory: ${{ matrix.directory }}

      - name: Install Terraform ${{ steps.minMax.outputs.minVersion }}
        uses: step-security/setup-terraform@v4
        with:
          terraform_version: ${{ steps.minMax.outputs.minVersion }}

      - name: Terraform validate min (${{ steps.minMax.outputs.minVersion }})
        working-directory: ${{ matrix.directory }}
        run: |
          terraform init
          terraform validate

      - name: Install Terraform ${{ steps.minMax.outputs.maxVersion }}
        uses: step-security/setup-terraform@v4
        with:
          terraform_version: ${{ steps.minMax.outputs.maxVersion }}

      - name: Terraform validate max (${{ steps.minMax.outputs.maxVersion }})
        working-directory: ${{ matrix.directory }}
        run: |
          terraform init
          terraform validate
